<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Luna 中日翻译器</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#020617;
      --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08);
      --text:#eff6ff;
      --muted:#93c5fd;
      --btn-blue-1:#3b82f6;
      --btn-blue-2:#2563eb;
      --dst-font-scale:1;
      --dst-auto-size:32px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      height:100%;
      margin:0;
    }

    body{
      color:var(--text);
      background:radial-gradient(circle at top, #1e3a8a 0%, var(--bg1) 36%, var(--bg2) 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Hiragino Sans","Yu Gothic","PingFang SC",sans-serif;
    }

    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
    }

    .top{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .primary-btn{
      min-height:56px;
      border:none;
      border-radius:16px;
      color:#fff;
      font-size:17px;
      font-weight:800;
      background:linear-gradient(180deg,var(--btn-blue-1),var(--btn-blue-2));
      box-shadow:0 10px 24px rgba(37,99,235,.22);
    }

    .primary-btn.rec{
      background:linear-gradient(180deg,#ef4444,#dc2626);
    }

    .panels{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-rows:.95fr 1.45fr;
      gap:10px;
    }

    .card{
      min-height:0;
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--card);
      backdrop-filter:blur(10px);
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .label{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      width:72%;
      min-width:260px;
      max-width:420px;
      margin-left:auto;
    }

    .text{
      flex:1;
      min-height:0;
      overflow:auto;
      word-break:break-word;
      line-height:1.4;
      white-space:pre-wrap;
    }

    .src{
      font-size:clamp(24px,4.8vw,40px);
    }

    .dst{
      font-size:calc(var(--dst-auto-size, 32px) * var(--dst-font-scale, 1));
      font-weight:650;
    }

    .placeholder{
      opacity:.34;
    }

    .inputBox{
      width:100%;
      height:100%;
      min-height:0;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:20px;
      resize:none;
      outline:none;
      display:none;
    }

    .hint{
      margin-top:6px;
      font-size:12px;
      color:#cbd5e1;
      opacity:.9;
      line-height:1.4;
    }

    .sheet{
      position:fixed;
      inset:auto 0 0 0;
      background:#08101f;
      border-top-left-radius:22px;
      border-top-right-radius:22px;
      border-top:1px solid var(--line);
      padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);
      display:none;
      max-height:78vh;
      overflow:auto;
      z-index:1000;
    }

    .sheet.show{
      display:block;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin:10px 0;
    }

    .field label{
      font-size:13px;
      color:#bfdbfe;
    }

    .field input{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .row{
      display:flex;
      gap:8px;
    }

    .row>*{
      flex:1;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <button id="recordBtn" class="primary-btn">语音</button>
      <button id="cameraBtn" class="primary-btn">拍照</button>
      <button id="textModeBtn" class="primary-btn">文字</button>
      <button id="clearTopBtn" class="primary-btn">清空</button>
    </div>

    <input id="imageInput" type="file" accept="image/*" capture="environment" style="display:none" />

    <div class="panels">
      <section class="card">
        <div class="head">
          <div id="srcLabel" class="label">识别结果</div>
        </div>

        <div id="srcText" class="text src placeholder">……</div>
        <textarea id="srcInput" class="inputBox" placeholder="请输入中文或日文"></textarea>
      </section>

      <section class="card">
        <div class="head">
          <div id="dstLabel" class="label">翻译结果</div>
          <div class="actions">
            <button id="settingsBtn" class="primary-btn">设置</button>
            <button id="fontMinusBtn" class="primary-btn">-</button>
            <button id="fontPlusBtn" class="primary-btn">+</button>
            <button id="speakBtn" class="primary-btn">朗读</button>
          </div>
        </div>
        <div id="dstText" class="text dst placeholder">……</div>
        <div id="modelHint" class="hint">当前模型：自动</div>
      </section>
    </div>
  </div>

  <div id="sheet" class="sheet">
    <div class="field">
      <label>Relay URL</label>
      <input id="relayUrl" placeholder="https://xxx.up.railway.app" />
    </div>
    <div class="field">
      <label>访问密钥（RELAY_SECRET）</label>
      <input id="secret" type="password" placeholder="输入你的 relay secret" />
    </div>
    <div class="field">
      <label>快速模型（语音 / OCR / 短句）</label>
      <input id="fastModel" placeholder="gpt-4o-mini" />
    </div>
    <div class="field">
      <label>稳妥模型（复杂句）</label>
      <input id="smartModel" placeholder="gpt-4.1-mini" />
    </div>
    <div class="field">
      <label>翻译字体倍率（0.6 ~ 1.5，1为默认；初始会先按字数自动缩放）</label>
      <input id="fontScale" type="number" min="0.6" max="1.5" step="0.1" placeholder="1.0" />
    </div>
    <div class="row">
      <button id="saveBtn" class="primary-btn">保存</button>
      <button id="closeBtn" class="primary-btn">关闭</button>
    </div>
  </div>

  <script>
    (() => {
      const $ = s => document.querySelector(s);

      const recordBtn = $("#recordBtn");
      const cameraBtn = $("#cameraBtn");
      const textModeBtn = $("#textModeBtn");
      const clearTopBtn = $("#clearTopBtn");
      const settingsBtn = $("#settingsBtn");
      const fontMinusBtn = $("#fontMinusBtn");
      const fontPlusBtn = $("#fontPlusBtn");
      const imageInput = $("#imageInput");

      const srcText = $("#srcText");
      const srcInput = $("#srcInput");

      const dstText = $("#dstText");
      const speakBtn = $("#speakBtn");
      const modelHint = $("#modelHint");

      const sheet = $("#sheet");
      const relayUrl = $("#relayUrl");
      const secret = $("#secret");
      const fastModel = $("#fastModel");
      const smartModel = $("#smartModel");
      const fontScale = $("#fontScale");
      const saveBtn = $("#saveBtn");
      const closeBtn = $("#closeBtn");

      let mediaRecorder = null;
      let audioChunks = [];
      let lastTargetLang = "ja-JP";

      function initSettings() {
        relayUrl.value = localStorage.getItem("luna_relay_url") || "";
        secret.value = localStorage.getItem("luna_relay_secret") || "";
        fastModel.value = localStorage.getItem("luna_fast_model") || "gpt-4o-mini";
        smartModel.value = localStorage.getItem("luna_smart_model") || "gpt-4.1-mini";
        fontScale.value = localStorage.getItem("luna_font_scale") || "1.0";
        applyFontScale();
      }

      function saveSettings() {
        localStorage.setItem("luna_relay_url", relayUrl.value.trim());
        localStorage.setItem("luna_relay_secret", secret.value.trim());
        localStorage.setItem("luna_fast_model", fastModel.value.trim());
        localStorage.setItem("luna_smart_model", smartModel.value.trim());
        localStorage.setItem("luna_font_scale", fontScale.value.trim());
        applyFontScale();
      }

      function applyFontScale() {
        const scale = Number(fontScale.value || "1");
        const safeScale = Math.min(1.5, Math.max(0.6, scale || 1));
        document.documentElement.style.setProperty("--dst-font-scale", String(safeScale));
      }

      function adjustFontScale(delta) {
        let current = Number(fontScale.value || "1");
        current = Math.round((current + delta) * 10) / 10;
        current = Math.min(1.5, Math.max(0.6, current));
        fontScale.value = current.toFixed(1);
        saveSettings();
      }

      function setSourceDisplay(text) {
        srcText.style.display = "block";
        srcInput.style.display = "none";
        srcText.textContent = text || "……";
        srcText.classList.toggle("placeholder", !text);
      }

      function setSourceInput(text = "") {
        srcText.style.display = "none";
        srcInput.style.display = "block";
        srcInput.value = text;
        setTimeout(() => srcInput.focus(), 50);
      }

      function getSourceInputValue() {
        return srcInput.value.trim();
      }

      function setTarget(text, lang = "ja-JP") {
        dstText.textContent = text || "……";
        dstText.classList.toggle("placeholder", !text);
        lastTargetLang = lang;

        const len = (text || "").replace(/\s/g, "").length;
        let autoSize = "32px";

        if (len <= 12) {
          autoSize = "40px";
        } else if (len <= 24) {
          autoSize = "32px";
        } else if (len <= 40) {
          autoSize = "26px";
        } else if (len <= 60) {
          autoSize = "22px";
        } else {
          autoSize = "18px";
        }

        document.documentElement.style.setProperty("--dst-auto-size", autoSize);
      }

      function setModelHint(text) {
        modelHint.textContent = text || "当前模型：自动";
      }

      function speak(text, lang) {
        if (!text || text === "……" || !("speechSynthesis" in window)) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang || "ja-JP";
        speechSynthesis.speak(u);
      }

      function estimateComplexity(text) {
        if (!text) return false;

        const len = text.length;
        const punctCount = (text.match(/[，。！？；、,.!?;:：]/g) || []).length;
        const lineBreaks = (text.match(/\n/g) || []).length;
        const hasBrackets = /[()（）\[\]【】]/.test(text);
        const hasMedicalTerms = /甲状腺|肿瘤|切除|穿刺|淋巴|转移|病理|甲状旁腺|麻醉|气管|滤泡癌|囊肿|甲状腺機能|腫瘍|病理|切除|転移|リンパ|麻酔|気管|结节|病灶|可疑|炎症|增生|复查|随访|穿刺吸引|超声|B超|CT|MRI|血检|术后|病理切片|肺部|淋巴结/.test(text);

        return len > 28 || punctCount >= 2 || lineBreaks > 0 || hasBrackets || hasMedicalTerms;
      }

      function chooseModelForText(text, scene = "text") {
        const fast = fastModel.value.trim() || "gpt-4o-mini";
        const smart = smartModel.value.trim() || "gpt-4.1-mini";

        if (scene === "voice") return fast;
        if (scene === "ocr") return fast;
        return estimateComplexity(text) ? smart : fast;
      }

      function mixedNaturalMedicalPromptText() {
        return `You are a face-to-face interpreter between Simplified Chinese and Japanese.

Rules:
1) Detect whether the source is Chinese or Japanese.
2) Translate only into the other language.

3) For medical and veterinary terminology, prioritize standard clinical terminology and commonly used expressions in Japanese clinical notes, imaging reports, pathology reports, discharge summaries, and doctor-patient communication.

4) For non-medical content, prioritize natural paraphrasing over literal translation. Make it sound smooth, natural, and human, not stiff or mechanical.

5) Avoid Chinese-style direct mapping when a more natural Japanese or Chinese expression exists.

6) Preserve medical facts exactly, including anatomy, diagnoses, symptoms, procedures, drugs, test names, pathology terms, and uncertainty.

7) When a sentence contains both medical and non-medical content, keep the medical terms precise, but make the surrounding language natural and conversational.

8) Prefer warm, natural, professional phrasing. Do not sound cold, robotic, or overly textbook-like.

9) Do not add explanations unless the original requires clarification.

10) Return JSON only:
{"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"..."}`;
      }

      function mixedNaturalMedicalPromptImage() {
        return `You are a face-to-face interpreter between Simplified Chinese and Japanese.

Rules:
1) OCR the image accurately.
2) Detect whether the source is Chinese or Japanese.
3) Translate only into the other language.

4) For medical and veterinary terminology, prioritize standard clinical terminology and commonly used expressions in Japanese clinical notes, imaging reports, pathology reports, discharge summaries, and doctor-patient communication.

5) For non-medical content, prioritize natural paraphrasing over literal translation. Make it sound smooth, natural, and human, not stiff or mechanical.

6) Avoid Chinese-style direct mapping when a more natural Japanese or Chinese expression exists.

7) Preserve medical facts exactly, including anatomy, diagnoses, symptoms, procedures, drugs, test names, pathology terms, and uncertainty.

8) When a sentence contains both medical and non-medical content, keep the medical terms precise, but make the surrounding language natural and conversational.

9) Prefer warm, natural, professional phrasing. Do not sound cold, robotic, or overly textbook-like.

10) Return JSON only:
{"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"...","ocr_text":"..."}`;
      }

      async function callTranslate(inputText, scene = "text") {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");

        const pickedModel = chooseModelForText(inputText, scene);
        setModelHint(`当前模型：${pickedModel}`);

        const url = base.endsWith("/") ? base + "translate" : base + "/translate";

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            mode: "text",
            model: pickedModel,
            temperature: 0.2,
            input_text: inputText,
            system_prompt: mixedNaturalMedicalPromptText()
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        if (data.translation) return data;
        if (data.output_text) {
          try { return JSON.parse(data.output_text); } catch(e) {}
        }
        return { translation: JSON.stringify(data) };
      }

      async function callImage(base64DataUrl) {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");

        const pickedModel = chooseModelForText("", "ocr");
        setModelHint(`当前模型：${pickedModel}`);

        const url = base.endsWith("/") ? base + "translate" : base + "/translate";

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            mode: "image",
            model: pickedModel,
            temperature: 0.2,
            input_image: base64DataUrl,
            system_prompt: mixedNaturalMedicalPromptImage()
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      async function callTranscribe(audioBase64) {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");

        setModelHint("当前模型：gpt-4o-mini-transcribe → 快模型翻译");

        const url = base.endsWith("/") ? base + "transcribe" : base + "/transcribe";

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            audio_base64: audioBase64
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const result = reader.result.split(",")[1];
            resolve(result);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function startRecord() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
          };

          mediaRecorder.onstop = async () => {
            try {
              recordBtn.classList.remove("rec");
              recordBtn.textContent = "语音";

              const blob = new Blob(audioChunks, { type: "audio/webm" });
              const audioBase64 = await blobToBase64(blob);

              setSourceDisplay("语音识别中…");
              setTarget("翻译中…", "ja-JP");

              const tr = await callTranscribe(audioBase64);
              setSourceDisplay(tr.text || "");

              const translated = await callTranslate(tr.text || "", "voice");
              const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";

              setSourceDisplay(translated.cleaned_source || tr.text || "");
              setTarget(translated.translation || "", tl);
            } catch (err) {
              setTarget("错误：" + err.message);
            }
          };

          mediaRecorder.start();
          recordBtn.classList.add("rec");
          recordBtn.textContent = "停止";
        } catch (err) {
          setTarget("无法录音：" + err.message);
        }
      }

      function stopRecord() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }

      recordBtn.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          stopRecord();
        } else {
          startRecord();
        }
      });

      cameraBtn.addEventListener("click", () => imageInput.click());

      imageInput.addEventListener("change", async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const dataUrl = reader.result;
            setSourceDisplay("图片识别中…");
            setTarget("翻译中…", "ja-JP");

            const r = await callImage(dataUrl);
            const tl = r.target_language === "ja" ? "ja-JP" : "zh-CN";
            setSourceDisplay(r.cleaned_source || r.ocr_text || "识别完成");
            setTarget(r.translation || "", tl);
          } catch (err) {
            setTarget("错误：" + err.message);
          }
        };
        reader.readAsDataURL(file);
        imageInput.value = "";
      });

      textModeBtn.addEventListener("click", () => {
        setSourceInput("");
        setTarget("……", "ja-JP");
        setModelHint("当前模型：自动");
      });

      srcInput.addEventListener("input", async () => {
        const text = getSourceInputValue();
        if (!text) {
          setTarget("……", "ja-JP");
          setModelHint("当前模型：自动");
          return;
        }

        try {
          setTarget("翻译中…", "ja-JP");
          const translated = await callTranslate(text, "text");
          const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";
          setTarget(translated.translation || "", tl);
        } catch (err) {
          setTarget("错误：" + err.message);
        }
      });

      clearTopBtn.addEventListener("click", () => {
        setSourceDisplay("");
        setTarget("");
        srcInput.value = "";
        setModelHint("当前模型：自动");
      });

      fontMinusBtn.addEventListener("click", () => {
        adjustFontScale(-0.1);
      });

      fontPlusBtn.addEventListener("click", () => {
        adjustFontScale(0.1);
      });

      speakBtn.addEventListener("click", () => {
        speak(dstText.textContent.trim(), lastTargetLang || "ja-JP");
      });

      settingsBtn.addEventListener("click", () => sheet.classList.add("show"));
      closeBtn.addEventListener("click", () => sheet.classList.remove("show"));
      saveBtn.addEventListener("click", () => {
        saveSettings();
        sheet.classList.remove("show");
        alert("已保存");
      });

      initSettings();
      setSourceDisplay("");
      setTarget("");
      setModelHint("当前模型：自动");
    })();
  </script>
</body>
</html>
