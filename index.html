<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Luna 中日翻译器</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#020617;
      --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08);
      --text:#eff6ff;
      --muted:#93c5fd;
      --btn-blue-1:#3b82f6;
      --btn-blue-2:#2563eb;
      --dst-font-scale:1;
      --dst-auto-size:32px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      height:100%;
      margin:0;
    }

    body{
      color:var(--text);
      background:radial-gradient(circle at top, #1e3a8a 0%, var(--bg1) 36%, var(--bg2) 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Hiragino Sans","Yu Gothic","PingFang SC",sans-serif;
    }

    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
    }

    .top{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .primary-btn{
      min-height:56px;
      border:none;
      border-radius:16px;
      color:#fff;
      font-size:17px;
      font-weight:800;
      background:linear-gradient(180deg,var(--btn-blue-1),var(--btn-blue-2));
      box-shadow:0 10px 24px rgba(37,99,235,.22);
      user-select: none;
    }

    .primary-btn.rec{
      background:linear-gradient(180deg,#ef4444,#dc2626);
    }

    .primary-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .panels{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-rows:.95fr 1.45fr;
      gap:10px;
    }

    .card{
      min-height:0;
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--card);
      backdrop-filter:blur(10px);
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .label{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      width:72%;
      min-width:260px;
      max-width:420px;
      margin-left:auto;
    }

    .text{
      flex:1;
      min-height:0;
      overflow:auto;
      word-break:break-word;
      line-height:1.4;
      white-space:pre-wrap;
    }

    .src{
      font-size:clamp(24px,4.8vw,40px);
    }

    .dst{
      font-size:calc(var(--dst-auto-size, 32px) * var(--dst-font-scale, 1));
      font-weight:650;
    }

    .placeholder{
      opacity:.34;
    }

    .inputBox{
      width:100%;
      height:100%;
      min-height:0;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:20px;
      resize:none;
      outline:none;
      display:none;
    }

    .sheet{
      position:fixed;
      inset:auto 0 0 0;
      background:#08101f;
      border-top-left-radius:22px;
      border-top-right-radius:22px;
      border-top:1px solid var(--line);
      padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);
      display:none;
      max-height:78vh;
      overflow:auto;
      z-index:1000;
    }

    .sheet.show{
      display:block;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin:10px 0;
    }

    .field label{
      font-size:13px;
      color:#bfdbfe;
    }

    .field input{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .row{
      display:flex;
      gap:8px;
    }

    .row>*{
      flex:1;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <button id="recordBtn" class="primary-btn">语音</button>
      <button id="cameraBtn" class="primary-btn">拍照</button>
      <button id="textModeBtn" class="primary-btn">文字</button>
      <button id="clearTopBtn" class="primary-btn">清空</button>
    </div>

    <input id="imageInput" type="file" accept="image/*" capture="environment" style="display:none" />

    <div class="panels">
      <section class="card">
        <div class="head">
          <div id="srcLabel" class="label">识别结果</div>
        </div>

        <div id="srcText" class="text src placeholder">……</div>
        <textarea id="srcInput" class="inputBox" placeholder="请输入中文或日文"></textarea>
      </section>

      <section class="card">
        <div class="head">
          <div id="dstLabel" class="label">翻译结果</div>
          <div class="actions">
            <button id="settingsBtn" class="primary-btn">设置</button>
            <button id="fontMinusBtn" class="primary-btn">-</button>
            <button id="fontPlusBtn" class="primary-btn">+</button>
            <button id="speakBtn" class="primary-btn">朗读</button>
          </div>
        </div>
        <div id="dstText" class="text dst placeholder">……</div>
      </section>
    </div>
  </div>

  <div id="sheet" class="sheet">
    <div class="field">
      <label>Relay URL</label>
      <input id="relayUrl" placeholder="https://xxx.up.railway.app" />
    </div>
    <div class="field">
      <label>访问密钥（RELAY_SECRET）</label>
      <input id="secret" type="password" placeholder="输入你的 relay secret" />
    </div>
    <div class="field">
      <label>翻译模型</label>
      <input id="model" placeholder="gpt-4.1-mini" />
    </div>
    <div class="field">
      <label>翻译字体倍率（0.6 ~ 1.5，1为默认；初始会先按字数自动缩放）</label>
      <input id="fontScale" type="number" min="0.6" max="1.5" step="0.1" placeholder="1.0" />
    </div>
    <div class="row">
      <button id="saveBtn" class="primary-btn">保存</button>
      <button id="closeBtn" class="primary-btn">关闭</button>
    </div>
  </div>

  <script>
    (() => {
      const $ = s => document.querySelector(s);

      const recordBtn = $("#recordBtn");
      const cameraBtn = $("#cameraBtn");
      const textModeBtn = $("#textModeBtn");
      const clearTopBtn = $("#clearTopBtn");
      const settingsBtn = $("#settingsBtn");
      const fontMinusBtn = $("#fontMinusBtn");
      const fontPlusBtn = $("#fontPlusBtn");
      const imageInput = $("#imageInput");

      const srcText = $("#srcText");
      const srcInput = $("#srcInput");

      const dstText = $("#dstText");
      const speakBtn = $("#speakBtn");

      const sheet = $("#sheet");
      const relayUrl = $("#relayUrl");
      const secret = $("#secret");
      const model = $("#model");
      const fontScale = $("#fontScale");
      const saveBtn = $("#saveBtn");
      const closeBtn = $("#closeBtn");

      let mediaRecorder = null;
      let audioChunks = [];
      let lastTargetLang = "ja-JP";
      // 新增：请求锁，防止重复点击、重复并发请求
      let isRequesting = false;
      // 新增：录音流对象，用于结束后释放麦克风
      let audioStream = null;
      // 新增：输入防抖定时器
      let inputDebounceTimer = null;
      const DEBOUNCE_DELAY = 600;

      function initSettings() {
        relayUrl.value = localStorage.getItem("luna_relay_url") || "";
        secret.value = localStorage.getItem("luna_relay_secret") || "";
        model.value = localStorage.getItem("luna_model") || "gpt-4.1-mini";
        fontScale.value = localStorage.getItem("luna_font_scale") || "1.0";
        applyFontScale();
      }

      function saveSettings() {
        localStorage.setItem("luna_relay_url", relayUrl.value.trim());
        localStorage.setItem("luna_relay_secret", secret.value.trim());
        localStorage.setItem("luna_model", model.value.trim());
        localStorage.setItem("luna_font_scale", fontScale.value.trim());
        applyFontScale();
      }

      function applyFontScale() {
        const scale = Number(fontScale.value || "1");
        const safeScale = Math.min(1.5, Math.max(0.6, scale || 1));
        document.documentElement.style.setProperty("--dst-font-scale", String(safeScale));
      }

      function adjustFontScale(delta) {
        let current = Number(fontScale.value || "1");
        current = Math.round((current + delta) * 10) / 10;
        current = Math.min(1.5, Math.max(0.6, current));
        fontScale.value = current.toFixed(1);
        saveSettings();
      }

      function setSourceDisplay(text) {
        srcText.style.display = "block";
        srcInput.style.display = "none";
        srcText.textContent = text || "……";
        srcText.classList.toggle("placeholder", !text);
      }

      function setSourceInput(text = "") {
        srcText.style.display = "none";
        srcInput.style.display = "block";
        srcInput.value = text;
        setTimeout(() => srcInput.focus(), 50);
      }

      function getSourceInputValue() {
        return srcInput.value.trim();
      }

      function setTarget(text, lang = "ja-JP") {
        dstText.textContent = text || "……";
        dstText.classList.toggle("placeholder", !text);
        lastTargetLang = lang;

        const len = (text || "").replace(/\s/g, "").length;
        let autoSize = "32px";

        if (len <= 12) autoSize = "40px";
        else if (len <= 24) autoSize = "32px";
        else if (len <= 40) autoSize = "26px";
        else if (len <= 60) autoSize = "22px";
        else autoSize = "18px";

        document.documentElement.style.setProperty("--dst-auto-size", autoSize);
      }

      function speak(text, lang) {
        if (!text || text === "……" || !("speechSynthesis" in window)) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        // 兼容标准语言码，修复朗读语种错误
        u.lang = lang === "ja-JP" ? "ja-JP" : "zh-CN";
        u.rate = 1;
        u.volume = 1;
        speechSynthesis.speak(u);
      }

      // 统一请求异常处理封装
      function handleError(msg) {
        isRequesting = false;
        recordBtn.disabled = false;
        setTarget(`错误：${msg}`);
        console.error("请求异常:", msg);
      }

      async function callTranslate(inputText) {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");
        if (!inputText) throw new Error("无待翻译文本");

        const url = base.endsWith("/") ? base + "translate" : base + "/translate";

        const res = await fetch(url, {
          method: "POST",
          signal: AbortSignal.timeout(25000), // 新增接口超时限制25秒
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            mode: "text",
            model: model.value.trim() || "gpt-4.1-mini",
            temperature: 0.1, // 降低温度，翻译更精准，减少胡编乱造
            input_text: inputText,
            system_prompt: `严格中日互译专业医疗口语翻译器，仅执行翻译，**绝对禁止**添加解释、备注、拓展、额外对话、礼貌用语。
规则严格强制：
1. 自动识别输入文本是简体中文 或 日语
2. 只翻译成另外一门语言，不双向重复、不新增内容
3. 医疗、日常口语用词精准自然，不生硬机翻
4. 仅返回固定JSON格式，**除此之外绝对不能输出任何字符**
固定返回格式：
{"source_language":"zh"或"ja","target_language":"ja"或"zh","translation":"翻译结果","cleaned_source":"纯净原文去除多余符号"}`
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `接口异常 ${res.status}`);

        // 兼容后端多种返回字段，全容错读取
        let result = {};
        result.source_language = data.source_language;
        result.target_language = data.target_language;
        result.translation = data.translation || data.output_text || "";
        result.cleaned_source = data.cleaned_source || inputText;

        if (!result.translation) throw new Error("接口未返回有效翻译内容");
        return result;
      }

      async function callImage(base64DataUrl) {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");

        const url = base.endsWith("/") ? base + "translate" : base + "/translate";

        const res = await fetch(url, {
          method: "POST",
          signal: AbortSignal.timeout(30000),
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            mode: "image",
            model: model.value.trim() || "gpt-4.1-mini",
            temperature: 0.1,
            input_image: base64DataUrl,
            system_prompt: `精准图片文字OCR识别+中日医疗互译，仅翻译无额外内容。
1. 高精度提取图片内中日文字
2. 自动识别语种，仅翻译成另一门语言
3. 只返回固定JSON，无多余字符
格式：{"source_language":"zh"/"ja","target_language":"ja"/"zh","translation":"结果","cleaned_source":"纯净原文","ocr_text":"完整识别文字"}`
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      async function callTranscribe(audioBase64) {
        const base = relayUrl.value.trim();
        const sec = secret.value.trim();
        if (!base) throw new Error("请先填写 Relay URL");
        if (!sec) throw new Error("请先填写访问密钥");

        const url = base.endsWith("/") ? base + "transcribe" : base + "/transcribe";

        const res = await fetch(url, {
          method: "POST",
          signal: AbortSignal.timeout(25000),
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sec}`
          },
          body: JSON.stringify({
            audio_base64: audioBase64
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `语音识别接口异常 ${res.status}`);

        // 兼容后端所有语音返回字段，全方位容错，解决识别为空问题
        const voiceText = data.text || data.result || data.transcript || data.content || "";
        if (!voiceText) throw new Error("未识别到有效语音内容，请重新说话");
        return { text: voiceText };
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const full = reader.result;
            const base64 = full.split(",")[1];
            if(!base64) reject(new Error("音频转码失败"));
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function startRecord() {
        if (isRequesting) return;
        try {
          // 优先释放旧流，解决麦克风占用卡死
          if(audioStream) {
            audioStream.getTracks().forEach(t => t.stop());
          }

          // 兼容全浏览器录音格式，优先通用mp3/webm，适配绝大多数中转语音接口
          const mimeTypes = [
            'audio/mp3',
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg'
          ];
          let recordType = 'audio/webm';
          // 自动检测浏览器支持的最佳录音格式
          for(let type of mimeTypes) {
            if(MediaRecorder.isTypeSupported(type)) {
              recordType = type;
              break;
            }
          }

          audioStream = await navigator.mediaDevices.getUserMedia({ 
            audio: true,
            video: false
          });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(audioStream, { mimeType: recordType });

          mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
          };

          mediaRecorder.onstop = async () => {
            // 录音结束立即释放麦克风
            audioStream.getTracks().forEach(t => t.stop());
            
            recordBtn.classList.remove("rec");
            recordBtn.textContent = "语音";
            isRequesting = true;
            recordBtn.disabled = true;

            try {
              const blob = new Blob(audioChunks, { type: recordType });
              if(blob.size < 500) throw new Error("录音内容过短，请重新录制");
              
              const audioBase64 = await blobToBase64(blob);

              setSourceDisplay("语音识别中…");
              setTarget("翻译中…", "ja-JP");

              // 语音识别
              const tr = await callTranscribe(audioBase64);
              setSourceDisplay(tr.text);

              // 紧接着自动翻译
              const translated = await callTranslate(tr.text);
              const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";

              setSourceDisplay(translated.cleaned_source || tr.text);
              setTarget(translated.translation, tl);

            } catch (err) {
              handleError(err.message);
            } finally {
              isRequesting = false;
              recordBtn.disabled = false;
            }
          };

          mediaRecorder.start(100); // 分片采集，防止大音频截断
          recordBtn.classList.add("rec");
          recordBtn.textContent = "停止";
        } catch (err) {
          handleError("麦克风权限/设备异常：" + err.message);
        }
      }

      function stopRecord() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }

      recordBtn.addEventListener("click", () => {
        if (isRequesting) return;
        if (mediaRecorder && mediaRecorder.state === "recording") {
          stopRecord();
        } else {
          startRecord();
        }
      });

      cameraBtn.addEventListener("click", () => imageInput.click());

      imageInput.addEventListener("change", async (ev) => {
        if(isRequesting) return;
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;
        isRequesting = true;
        recordBtn.disabled = true;

        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const dataUrl = reader.result;
            setSourceDisplay("图片识别中…");
            setTarget("翻译中…", "ja-JP");

            const r = await callImage(dataUrl);
            const tl = r.target_language === "ja" ? "ja-JP" : "zh-CN";
            setSourceDisplay(r.cleaned_source || r.ocr_text || "识别完成");
            setTarget(r.translation || "", tl);
          } catch (err) {
            handleError(err.message);
          } finally {
            isRequesting = false;
            recordBtn.disabled = false;
          }
        };
        reader.readAsDataURL(file);
        imageInput.value = "";
      });

      textModeBtn.addEventListener("click", () => {
        setSourceInput("");
        setTarget("……", "ja-JP");
      });

      // 文本输入增加防抖，防止频繁请求接口
      srcInput.addEventListener("input", async () => {
        clearTimeout(inputDebounceTimer);
        const text = getSourceInputValue();
        if (!text) {
          setTarget("……", "ja-JP");
          return;
        }
        setTarget("翻译中…", "ja-JP");
        
        inputDebounceTimer = setTimeout(async () => {
          if(isRequesting) return;
          isRequesting = true;
          try {
            const translated = await callTranslate(text);
            const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";
            setTarget(translated.translation || "", tl);
          } catch (err) {
            setTarget("错误：" + err.message);
          } finally {
            isRequesting = false;
          }
        }, DEBOUNCE_DELAY);
      });

      clearTopBtn.addEventListener("click", () => {
        clearTimeout(inputDebounceTimer);
        isRequesting = false;
        setSourceDisplay("");
        setTarget("");
        srcInput.value = "";
        // 额外清空录音状态
        if(audioStream) audioStream.getTracks().forEach(t=>t.stop());
        recordBtn.classList.remove("rec");
        recordBtn.textContent = "语音";
      });

      fontMinusBtn.addEventListener("click", () => {
        adjustFontScale(-0.1);
      });

      fontPlusBtn.addEventListener("click", () => {
        adjustFontScale(0.1);
      });

      speakBtn.addEventListener("click", () => {
        speak(dstText.textContent.trim(), lastTargetLang || "ja-JP");
      });

      settingsBtn.addEventListener("click", () => sheet.classList.add("show"));
      closeBtn.addEventListener("click", () => sheet.classList.remove("show"));
      saveBtn.addEventListener("click", () => {
        saveSettings();
        sheet.classList.remove("show");
        alert("配置已保存");
      });

      // 页面销毁/关闭时释放麦克风
      window.addEventListener("beforeunload", ()=>{
        if(audioStream) audioStream.getTracks().forEach(t=>t.stop());
      });

      initSettings();
      setSourceDisplay("");
      setTarget("");
    })();
  </script>
</body>
</html>
