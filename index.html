<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna翻译器</title>
</head>
<body style="background:#111;color:#fff;font-size:20px;padding:20px">

<h2>录音</h2>
<button id="recordBtn">开始录音</button>

<h3>识别结果</h3>
<div id="src"></div>

<h3>翻译结果</h3>
<div id="dst"></div>

<script>
let mediaRecorder;
let chunks = [];

const RELAY_URL = localStorage.getItem("url") || "";
const SECRET = localStorage.getItem("key") || "";

document.getElementById("recordBtn").onclick = async () => {

  if (!mediaRecorder || mediaRecorder.state === "inactive") {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = async () => {

      const blob = new Blob(chunks);
      const base64 = await blobToBase64(blob);

      document.getElementById("src").innerText = "识别中...";
      document.getElementById("dst").innerText = "";

      // 1️⃣ 语音识别
      const res1 = await fetch(RELAY_URL + "/transcribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + SECRET
        },
        body: JSON.stringify({ audio_base64: base64 })
      });

      const data1 = await res1.json();

      document.getElementById("src").innerText = data1.text;

      // 2️⃣ 翻译
      const res2 = await fetch(RELAY_URL + "/translate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + SECRET
        },
        body: JSON.stringify({ input_text: data1.text })
      });

      const data2 = await res2.json();

      document.getElementById("dst").innerText = data2.translation;
    };

    mediaRecorder.start();
    document.getElementById("recordBtn").innerText = "停止录音";

  } else {

    mediaRecorder.stop();
    document.getElementById("recordBtn").innerText = "开始录音";

  }
};

function blobToBase64(blob) {
  return new Promise(r => {
    const reader = new FileReader();
    reader.onloadend = () => r(reader.result.split(",")[1]);
    reader.readAsDataURL(blob);
  });
}
</script>

</body>
</html>
