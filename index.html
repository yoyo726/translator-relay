<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Luna 中日翻译器</title>
  <style>
    :root{
      --bg1:#0f172a; --bg2:#020617; --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08); --text:#eff6ff; --muted:#93c5fd;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0; color:var(--text);
      background:radial-gradient(circle at top, #1e3a8a 0%, var(--bg1) 36%, var(--bg2) 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Hiragino Sans","Yu Gothic","PingFang SC",sans-serif;
    }
    .app{height:100%;display:flex;flex-direction:column;gap:8px;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px}
    .top{display:grid;grid-template-columns:1fr auto auto auto;gap:8px}
    .record,.camera,.translateBtn{
      min-height:56px;border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:800;
      box-shadow:0 10px 24px rgba(37,99,235,.22)
    }
    .record{background:linear-gradient(180deg,#3b82f6,#2563eb)}
    .record.rec{background:linear-gradient(180deg,#ef4444,#dc2626)}
    .camera,.translateBtn{padding:0 12px;background:rgba(255,255,255,.10);font-size:15px;white-space:nowrap}
    .gear,.mini{
      border:none;border-radius:14px;background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:700
    }
    .gear{min-width:56px}
    .panels{flex:1;min-height:0;display:grid;grid-template-rows:.72fr 1.28fr;gap:8px}
    .card{
      min-height:0;border:1px solid var(--line);border-radius:20px;background:var(--card);
      backdrop-filter:blur(10px);padding:10px;display:flex;flex-direction:column
    }
    .head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
    .label{font-size:14px;color:var(--muted);font-weight:700;white-space:nowrap}
    .actions{display:flex;gap:6px}
    .mini{padding:7px 10px}
    .mini.primary{background:linear-gradient(180deg,#22c55e,#16a34a)}
    .text{flex:1;min-height:0;overflow:auto;word-break:break-word;line-height:1.34}
    .src{font-size:clamp(24px,4.8vw,40px)}
    .dst{font-size:clamp(30px,5.6vw,54px);font-weight:650}
    .placeholder{opacity:.34}
    .sheet{
      position:fixed;inset:auto 0 0 0;background:#08101f;border-top-left-radius:22px;border-top-right-radius:22px;
      border-top:1px solid var(--line);padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);display:none;max-height:78vh;overflow:auto
    }
    .sheet.show{display:block}
    .field{display:flex;flex-direction:column;gap:6px;margin:10px 0}
    .field label{font-size:13px;color:#bfdbfe}
    .field input,.field textarea,.field select{
      width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff;border-radius:14px;
      padding:12px;font-size:15px
    }
    .row{display:flex;gap:8px}
    .row>*{flex:1}
    .preview{
      width:100%;max-height:110px;object-fit:contain;border-radius:12px;margin-top:8px;display:none;
      border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)
    }
    .manualInput{
      width:100%;min-height:88px;background:rgba(255,255,255,.06);border:1px solid var(--line);
      color:#fff;border-radius:14px;padding:12px;font-size:16px;margin-top:8px
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <button id="recordBtn" class="record">录音</button>
    <button id="cameraBtn" class="camera">拍照</button>
    <button id="translateBtn" class="translateBtn">翻译输入</button>
    <button id="settingsBtn" class="gear">设置</button>
  </div>

  <input id="imageInput" type="file" accept="image/*" capture="environment" style="display:none" />

  <div class="panels">
    <section class="card">
      <div class="head">
        <div id="srcLabel" class="label">识别结果</div>
      </div>
      <div id="srcText" class="text src placeholder">……</div>
      <img id="preview" class="preview" alt="preview">
      <textarea id="manualInput" class="manualInput" placeholder="也可以直接手动输入中文或日文"></textarea>
    </section>

    <section class="card">
      <div class="head">
        <div id="dstLabel" class="label">翻译结果</div>
        <div class="actions">
          <button id="clearBtn" class="mini">清空</button>
          <button id="speakBtn" class="mini primary">朗读</button>
        </div>
      </div>
      <div id="dstText" class="text dst placeholder">……</div>
    </section>
  </div>
</div>

<div id="sheet" class="sheet">
  <div class="field">
    <label>Relay URL</label>
    <input id="relayUrl" placeholder="https://xxx.up.railway.app" />
  </div>
  <div class="field">
    <label>访问密钥（RELAY_SECRET）</label>
    <input id="secret" type="password" placeholder="输入你的 relay secret" />
  </div>
  <div class="field">
    <label>翻译模型</label>
    <input id="model" placeholder="gpt-4.1-mini" />
  </div>
  <div class="row">
    <button id="saveBtn" class="mini primary">保存</button>
    <button id="closeBtn" class="mini">关闭</button>
  </div>
</div>

<script>
(() => {
  const $ = s => document.querySelector(s);

  const recordBtn = $("#recordBtn");
  const cameraBtn = $("#cameraBtn");
  const translateBtn = $("#translateBtn");
  const settingsBtn = $("#settingsBtn");
  const imageInput = $("#imageInput");
  const srcText = $("#srcText");
  const dstText = $("#dstText");
  const clearBtn = $("#clearBtn");
  const speakBtn = $("#speakBtn");
  const preview = $("#preview");
  const manualInput = $("#manualInput");

  const sheet = $("#sheet");
  const relayUrl = $("#relayUrl");
  const secret = $("#secret");
  const model = $("#model");
  const saveBtn = $("#saveBtn");
  const closeBtn = $("#closeBtn");

  let mediaRecorder = null;
  let audioChunks = [];
  let lastTargetLang = "ja-JP";

  function initSettings() {
    relayUrl.value = localStorage.getItem("luna_relay_url") || "";
    secret.value = localStorage.getItem("luna_relay_secret") || "";
    model.value = localStorage.getItem("luna_model") || "gpt-4.1-mini";
  }

  function saveSettings() {
    localStorage.setItem("luna_relay_url", relayUrl.value.trim());
    localStorage.setItem("luna_relay_secret", secret.value.trim());
    localStorage.setItem("luna_model", model.value.trim());
  }

  function setSource(text) {
    srcText.textContent = text || "……";
    srcText.classList.toggle("placeholder", !text);
  }

  function setTarget(text, lang = "ja-JP") {
    dstText.textContent = text || "……";
    dstText.classList.toggle("placeholder", !text);
    lastTargetLang = lang;
  }

  function speak(text, lang) {
    if (!text || text === "……" || !("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || "ja-JP";
    speechSynthesis.speak(u);
  }

  async function callTranslate(inputText) {
    const base = relayUrl.value.trim();
    const sec = secret.value.trim();
    if (!base) throw new Error("请先填写 Relay URL");
    if (!sec) throw new Error("请先填写访问密钥");

    const url = base.endsWith("/") ? base + "translate" : base + "/translate";

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${sec}`
      },
      body: JSON.stringify({
        mode: "text",
        model: model.value.trim() || "gpt-4.1-mini",
        temperature: 0.2,
        input_text: inputText,
        system_prompt: `You are a medical-context face-to-face interpreter for simplified Chinese and Japanese.
Rules:
1) Detect whether the source is Chinese or Japanese.
2) Translate only into the other language.
3) Keep meaning exact. Do not add explanations unless needed to disambiguate.
4) For veterinary and medical contexts, prefer accurate, natural clinic-ready wording.
5) Return JSON only:
{"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"..."}`
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    if (data.translation) {
      return data;
    }

    if (data.output_text) {
      try { return JSON.parse(data.output_text); } catch(e) {}
    }

    return { translation: JSON.stringify(data) };
  }

  async function callImage(base64DataUrl) {
    const base = relayUrl.value.trim();
    const sec = secret.value.trim();
    if (!base) throw new Error("请先填写 Relay URL");
    if (!sec) throw new Error("请先填写访问密钥");

    const url = base.endsWith("/") ? base + "translate" : base + "/translate";

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${sec}`
      },
      body: JSON.stringify({
        mode: "image",
        model: model.value.trim() || "gpt-4.1-mini",
        temperature: 0.2,
        input_image: base64DataUrl,
        system_prompt: `You are a medical-context face-to-face interpreter for simplified Chinese and Japanese.
Rules:
1) OCR the image accurately.
2) Detect whether the source is Chinese or Japanese.
3) Translate only into the other language.
4) Return JSON only:
{"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"...","ocr_text":"..."}`
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  async function callTranscribe(audioBase64) {
    const base = relayUrl.value.trim();
    const sec = secret.value.trim();
    if (!base) throw new Error("请先填写 Relay URL");
    if (!sec) throw new Error("请先填写访问密钥");

    const url = base.endsWith("/") ? base + "transcribe" : base + "/transcribe";

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${sec}`
      },
      body: JSON.stringify({
        audio_base64: audioBase64
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result.split(",")[1];
        resolve(result);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function startRecord() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        try {
          recordBtn.classList.remove("rec");
          recordBtn.textContent = "录音";
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          const audioBase64 = await blobToBase64(blob);

          setSource("语音识别中…");
          setTarget("翻译中…", "ja-JP");

          const tr = await callTranscribe(audioBase64);
          setSource(tr.text || "");

          const translated = await callTranslate(tr.text || "");
          const sl = translated.source_language === "ja" ? "ja-JP" : "zh-CN";
          const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";

          setSource(translated.cleaned_source || tr.text || "");
          setTarget(translated.translation || "", tl);
          manualInput.value = translated.cleaned_source || tr.text || "";
        } catch (err) {
          setTarget("错误：" + err.message);
        }
      };

      mediaRecorder.start();
      recordBtn.classList.add("rec");
      recordBtn.textContent = "停止";
    } catch (err) {
      setTarget("无法录音：" + err.message);
    }
  }

  function stopRecord() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
    }
  }

  recordBtn.addEventListener("click", () => {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      stopRecord();
    } else {
      startRecord();
    }
  });

  cameraBtn.addEventListener("click", () => imageInput.click());

  imageInput.addEventListener("change", async (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const dataUrl = reader.result;
        preview.src = dataUrl;
        preview.style.display = "block";
        setSource("图片识别中…");
        setTarget("翻译中…", "ja-JP");

        const r = await callImage(dataUrl);
        const tl = r.target_language === "ja" ? "ja-JP" : "zh-CN";
        setSource(r.cleaned_source || r.ocr_text || "识别完成");
        setTarget(r.translation || "", tl);
      } catch (err) {
        setTarget("错误：" + err.message);
      }
    };
    reader.readAsDataURL(file);
    imageInput.value = "";
  });

  translateBtn.addEventListener("click", async () => {
    try {
      const text = manualInput.value.trim();
      if (!text) {
        setTarget("请先输入内容");
        return;
      }
      setSource(text);
      setTarget("翻译中…", "ja-JP");
      const translated = await callTranslate(text);
      const tl = translated.target_language === "ja" ? "ja-JP" : "zh-CN";
      setSource(translated.cleaned_source || text);
      setTarget(translated.translation || "", tl);
    } catch (err) {
      setTarget("错误：" + err.message);
    }
  });

  clearBtn.addEventListener("click", () => {
    setSource("");
    setTarget("");
    manualInput.value = "";
    preview.style.display = "none";
  });

  speakBtn.addEventListener("click", () => {
    speak(dstText.textContent.trim(), lastTargetLang || "ja-JP");
  });

  settingsBtn.addEventListener("click", () => sheet.classList.add("show"));
  closeBtn.addEventListener("click", () => sheet.classList.remove("show"));
  saveBtn.addEventListener("click", () => {
    saveSettings();
    sheet.classList.remove("show");
    alert("已保存");
  });

  initSettings();
})();
</script>
</body>
</html>
