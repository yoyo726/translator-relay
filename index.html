<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>✨ Luna 中日翻译器 · 稳音版</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#020617;
      --card:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.08);
      --text:#eff6ff;
      --muted:#93c5fd;
      --btn-blue-1:#3b82f6;
      --btn-blue-2:#2563eb;
      --dst-font-scale:1;
      --dst-auto-size:32px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      height:100%;
      margin:0;
    }

    body{
      color:var(--text);
      background:radial-gradient(circle at top, #1e3a8a 0%, var(--bg1) 36%, var(--bg2) 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Hiragino Sans","Yu Gothic","PingFang SC",sans-serif;
    }

    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
    }

    .top{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .primary-btn{
      min-height:56px;
      border:none;
      border-radius:16px;
      color:#fff;
      font-size:17px;
      font-weight:800;
      background:linear-gradient(180deg,var(--btn-blue-1),var(--btn-blue-2));
      box-shadow:0 10px 24px rgba(37,99,235,.22);
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .primary-btn:active{ opacity:0.8; }
    .primary-btn:disabled{
      opacity:0.5;
      pointer-events: none;
    }

    .primary-btn.rec{
      background:linear-gradient(180deg,#ef4444,#dc2626);
      animation: pulse-red 1.2s infinite;
    }
    @keyframes pulse-red{
      0%{ box-shadow:0 0 0 0 rgba(239,68,68,0.5); }
      70%{ box-shadow:0 0 0 10px rgba(239,68,68,0); }
      100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); }
    }

    .panels{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-rows:.95fr 1.45fr;
      gap:10px;
    }

    .card{
      min-height:0;
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--card);
      backdrop-filter:blur(10px);
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .label{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      width:72%;
      min-width:260px;
      max-width:420px;
      margin-left:auto;
    }

    .text{
      flex:1;
      min-height:0;
      overflow:auto;
      word-break:break-word;
      line-height:1.4;
      white-space:pre-wrap;
    }

    .src{
      font-size:clamp(24px,4.8vw,40px);
    }

    .dst{
      font-size:calc(var(--dst-auto-size, 32px) * var(--dst-font-scale, 1));
      font-weight:650;
    }

    .placeholder{
      opacity:.34;
    }

    .inputBox{
      width:100%;
      height:100%;
      min-height:0;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:20px;
      resize:none;
      outline:none;
      display:none;
    }

    /* 状态提示 */
    .status-badge{
      font-size:12px;
      padding:2px 10px;
      border-radius:20px;
      background:rgba(255,255,255,0.1);
      color:#bfdbfe;
      margin-left:8px;
    }

    .sheet{
      position:fixed;
      inset:auto 0 0 0;
      background:#08101f;
      border-top-left-radius:22px;
      border-top-right-radius:22px;
      border-top:1px solid var(--line);
      padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);
      display:none;
      max-height:78vh;
      overflow:auto;
      z-index:1000;
    }

    .sheet.show{
      display:block;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin:10px 0;
    }

    .field label{
      font-size:13px;
      color:#bfdbfe;
    }

    .field input{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .row{
      display:flex;
      gap:8px;
    }

    .row>*{
      flex:1;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <button id="recordBtn" class="primary-btn">🎤 语音</button>
    <button id="cameraBtn" class="primary-btn">📷 拍照</button>
    <button id="textModeBtn" class="primary-btn">✏️ 文字</button>
    <button id="clearTopBtn" class="primary-btn">🧹 清空</button>
  </div>

  <input id="imageInput" type="file" accept="image/*" capture="environment" style="display:none">

  <div class="panels">
    <section class="card">
      <div class="head">
        <div id="srcLabel" class="label">📥 识别结果 <span id="srcStatus" class="status-badge"></span></div>
      </div>

      <div id="srcText" class="text src placeholder">✨ 轻触「语音」或「拍照」</div>
      <textarea id="srcInput" class="inputBox" placeholder="输入中文或日文…"></textarea>
    </section>

    <section class="card">
      <div class="head">
        <div id="dstLabel" class="label">🌐 翻译结果 <span id="dstStatus" class="status-badge"></span></div>
        <div class="actions">
          <button id="settingsBtn" class="primary-btn">⚙️ 设置</button>
          <button id="fontMinusBtn" class="primary-btn">A-</button>
          <button id="fontPlusBtn" class="primary-btn">A+</button>
          <button id="speakBtn" class="primary-btn">🔊 朗读</button>
        </div>
      </div>
      <div id="dstText" class="text dst placeholder">……</div>
    </section>
  </div>
</div>

<div id="sheet" class="sheet">
  <div class="field">
    <label>🌍 Relay URL (必填)</label>
    <input id="relayUrl" placeholder="https://your-relay.up.railway.app" autocomplete="off">
  </div>
  <div class="field">
    <label>🔐 访问密钥 (RELAY_SECRET)</label>
    <input id="secret" type="password" placeholder="输入 relay secret" autocomplete="off">
  </div>
  <div class="field">
    <label>🧠 翻译模型</label>
    <input id="model" placeholder="gpt-4.1-mini">
  </div>
  <div class="field">
    <label>🔡 字体倍率 (0.6~1.5)</label>
    <input id="fontScale" type="number" min="0.6" max="1.5" step="0.1" placeholder="1.0">
  </div>
  <div class="row">
    <button id="saveBtn" class="primary-btn">💾 保存</button>
    <button id="closeBtn" class="primary-btn">❌ 关闭</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM 元素 ----------
    const $ = s => document.querySelector(s);
    const recordBtn = $('#recordBtn');
    const cameraBtn = $('#cameraBtn');
    const textModeBtn = $('#textModeBtn');
    const clearTopBtn = $('#clearTopBtn');
    const settingsBtn = $('#settingsBtn');
    const fontMinusBtn = $('#fontMinusBtn');
    const fontPlusBtn = $('#fontPlusBtn');
    const imageInput = $('#imageInput');
    const srcText = $('#srcText');
    const srcInput = $('#srcInput');
    const dstText = $('#dstText');
    const speakBtn = $('#speakBtn');
    const srcStatus = $('#srcStatus');
    const dstStatus = $('#dstStatus');
    const sheet = $('#sheet');
    const relayUrl = $('#relayUrl');
    const secret = $('#secret');
    const model = $('#model');
    const fontScale = $('#fontScale');
    const saveBtn = $('#saveBtn');
    const closeBtn = $('#closeBtn');

    // ---------- 全局状态 ----------
    let mediaRecorder = null;
    let audioChunks = [];
    let lastTargetLang = "ja-JP";
    let isRecording = false;
    let recordingTimeout = null;
    let currentAbortController = null;       // 用于取消请求
    let translateDebounceTimer = null;
    const RECORD_MAX_DURATION = 15000;        // 最长录音15秒

    // ---------- 初始化 & 设置 ----------
    function initSettings() {
      relayUrl.value = localStorage.getItem("luna_relay_url") || "";
      secret.value = localStorage.getItem("luna_relay_secret") || "";
      model.value = localStorage.getItem("luna_model") || "gpt-4.1-mini";
      fontScale.value = localStorage.getItem("luna_font_scale") || "1.0";
      applyFontScale();
    }

    function saveSettings() {
      localStorage.setItem("luna_relay_url", relayUrl.value.trim());
      localStorage.setItem("luna_relay_secret", secret.value.trim());
      localStorage.setItem("luna_model", model.value.trim());
      localStorage.setItem("luna_font_scale", fontScale.value.trim());
      applyFontScale();
    }

    function applyFontScale() {
      const scale = Number(fontScale.value || "1");
      const safe = Math.min(1.5, Math.max(0.6, scale || 1));
      document.documentElement.style.setProperty("--dst-font-scale", String(safe));
    }

    function adjustFontScale(delta) {
      let current = Number(fontScale.value || "1");
      current = Math.round((current + delta) * 10) / 10;
      current = Math.min(1.5, Math.max(0.6, current));
      fontScale.value = current.toFixed(1);
      saveSettings();
    }

    // ---------- UI 辅助 ----------
    function setStatus(element, text, isError = false) {
      if (element) {
        element.textContent = text || '';
        element.style.color = isError ? '#fca5a5' : '#bfdbfe';
      }
    }

    function clearStatuses() {
      setStatus(srcStatus, '');
      setStatus(dstStatus, '');
    }

    function setSourceDisplay(text, statusMsg = '') {
      srcText.style.display = "block";
      srcInput.style.display = "none";
      srcText.textContent = text || "……";
      srcText.classList.toggle("placeholder", !text);
      setStatus(srcStatus, statusMsg);
    }

    function setSourceInput(text = '') {
      srcText.style.display = "none";
      srcInput.style.display = "block";
      srcInput.value = text;
      setStatus(srcStatus, '✏️ 编辑中');
      setTimeout(() => srcInput.focus(), 50);
    }

    function getSourceInputValue() {
      return srcInput.value.trim();
    }

    function setTarget(text, lang = "ja-JP", statusMsg = '') {
      dstText.textContent = text || "……";
      dstText.classList.toggle("placeholder", !text);
      lastTargetLang = lang;
      setStatus(dstStatus, statusMsg);

      // 自适应字号
      const len = (text || '').replace(/\s/g, '').length;
      let auto = "32px";
      if (len <= 12) auto = "40px";
      else if (len <= 24) auto = "32px";
      else if (len <= 40) auto = "26px";
      else if (len <= 60) auto = "22px";
      else auto = "18px";
      document.documentElement.style.setProperty("--dst-auto-size", auto);
    }

    // ---------- 取消请求 & 超时包装 ----------
    function abortPreviousRequest() {
      if (currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }
    }

    async function fetchWithTimeout(url, options, timeoutMs = 18000) {
      abortPreviousRequest();
      const controller = new AbortController();
      currentAbortController = controller;
      const id = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return res;
      } catch (e) {
        clearTimeout(id);
        if (e.name === 'AbortError') throw new Error('请求超时或已取消');
        throw e;
      } finally {
        if (currentAbortController === controller) currentAbortController = null;
      }
    }

    // ---------- 后端调用 (增强错误处理) ----------
    async function callTranslate(inputText) {
      const base = relayUrl.value.trim();
      const sec = secret.value.trim();
      if (!base) throw new Error('请先填写 Relay URL');
      if (!sec) throw new Error('请先填写访问密钥');

      const url = base.endsWith('/') ? base + 'translate' : base + '/translate';
      const res = await fetchWithTimeout(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sec}` },
        body: JSON.stringify({
          mode: 'text',
          model: model.value.trim() || 'gpt-4.1-mini',
          temperature: 0.2,
          input_text: inputText,
          system_prompt: `You are a medical-context face-to-face interpreter for simplified Chinese and Japanese.
Rules:
1) Detect whether the source is Chinese or Japanese.
2) Translate only into the other language.
3) Keep meaning exact. Do not add explanations unless needed.
4) Return JSON only:
{"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"..."}`
        })
      }, 15000);

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `翻译服务错误 ${res.status}`);

      if (data.translation) return data;
      if (data.output_text) {
        try { return JSON.parse(data.output_text); } catch { return { translation: data.output_text }; }
      }
      return { translation: JSON.stringify(data) };
    }

    async function callImage(base64DataUrl) {
      const base = relayUrl.value.trim();
      const sec = secret.value.trim();
      if (!base) throw new Error('请先填写 Relay URL');
      if (!sec) throw new Error('请先填写访问密钥');

      const url = base.endsWith('/') ? base + 'translate' : base + '/translate';
      const res = await fetchWithTimeout(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sec}` },
        body: JSON.stringify({
          mode: 'image',
          model: model.value.trim() || 'gpt-4.1-mini',
          temperature: 0.2,
          input_image: base64DataUrl,
          system_prompt: `You are a medical-context interpreter. OCR image, detect language (zh/ja), translate to the other. Return JSON: {"source_language":"zh" or "ja","target_language":"ja" or "zh","translation":"...","cleaned_source":"...","ocr_text":"..."}`
        })
      }, 20000);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `图片识别失败 ${res.status}`);
      return data;
    }

    async function callTranscribe(audioBase64) {
      const base = relayUrl.value.trim();
      const sec = secret.value.trim();
      if (!base) throw new Error('请先填写 Relay URL');
      if (!sec) throw new Error('请先填写访问密钥');

      const url = base.endsWith('/') ? base + 'transcribe' : base + '/transcribe';
      const res = await fetchWithTimeout(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sec}` },
        body: JSON.stringify({ audio_base64: audioBase64 })
      }, 18000);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `语音识别失败 ${res.status}`);
      return data;
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // ---------- 语音录制 (优化稳定) ----------
    function stopRecordingAndCleanup() {
      if (recordingTimeout) {
        clearTimeout(recordingTimeout);
        recordingTimeout = null;
      }
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      isRecording = false;
      recordBtn.classList.remove('rec');
      recordBtn.textContent = '🎤 语音';
    }

    async function startRecord() {
      if (isRecording) {
        stopRecordingAndCleanup();
        return;
      }

      // 检查配置
      if (!relayUrl.value.trim() || !secret.value.trim()) {
        alert('请先在“设置”中填写 Relay URL 和密钥');
        return;
      }

      try {
        // 请求麦克风 (优化参数: 降噪、回声消除)
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        audioChunks = [];
        // 检测支持的 MIME (优先opus)
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'audio/webm';
        }
        mediaRecorder = new MediaRecorder(stream, { mimeType, audioBitsPerSecond: 64000 });

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          // 释放轨道
          stream.getTracks().forEach(track => track.stop());
          recordBtn.classList.remove('rec');
          recordBtn.textContent = '🎤 语音';
          isRecording = false;
          if (recordingTimeout) clearTimeout(recordingTimeout);

          if (audioChunks.length === 0) {
            setTarget('没有录制到音频', 'ja-JP', '⚠️ 无声');
            return;
          }

          try {
            setSourceDisplay('🎧 识别中…', '⏳ 语音转文字');
            setTarget('🔄 翻译中…', 'ja-JP', '⏳');

            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            const audioBase64 = await blobToBase64(blob);

            // 调用转写
            const tr = await callTranscribe(audioBase64);
            const recognizedText = tr.text || '';
            if (!recognizedText) throw new Error('未识别到语音内容');

            setSourceDisplay(recognizedText, '✅ 识别完成');
            
            // 翻译
            const translated = await callTranslate(recognizedText);
            const tl = translated.target_language === 'ja' ? 'ja-JP' : 'zh-CN';
            setSourceDisplay(translated.cleaned_source || recognizedText, '📝');
            setTarget(translated.translation || '', tl, '✨ 翻译完成');

          } catch (err) {
            console.warn('语音处理错误:', err);
            setTarget('❌ ' + (err.message || '语音识别/翻译失败'), 'ja-JP', '⚠️ 出错');
            setStatus(srcStatus, '❌ 失败', true);
          }
        };

        mediaRecorder.onerror = (e) => {
          console.error('录制错误', e);
          stopRecordingAndCleanup();
          setTarget('录音出错，请重试', 'ja-JP', '❌ 硬件错误');
        };

        mediaRecorder.start(200); // 每200ms返回数据
        isRecording = true;
        recordBtn.classList.add('rec');
        recordBtn.textContent = '⏹️ 停止';
        setSourceDisplay('🎙️ 正在录音… 请说话', '🔴 录音中');
        setTarget('……', 'ja-JP', '');

        // 最长录音自动停止
        recordingTimeout = setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            setSourceDisplay('⏰ 录音已达上限', '⏹️ 自动停止');
            stopRecordingAndCleanup();
          }
        }, RECORD_MAX_DURATION);

      } catch (err) {
        console.error('麦克风错误', err);
        let msg = '无法访问麦克风';
        if (err.name === 'NotAllowedError') msg = '麦克风权限被拒绝';
        else if (err.name === 'NotFoundError') msg = '未找到麦克风设备';
        setTarget(msg, 'ja-JP', '❌ 权限');
        isRecording = false;
        recordBtn.classList.remove('rec');
        recordBtn.textContent = '🎤 语音';
      }
    }

    // 语音按钮切换
    recordBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (isRecording) {
        stopRecordingAndCleanup();
      } else {
        startRecord();
      }
    });

    // ---------- 拍照 ----------
    cameraBtn.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', async (ev) => {
      const file = ev.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          abortPreviousRequest(); // 取消之前请求
          setSourceDisplay('🖼️ 识别图片…', '⏳ OCR');
          setTarget('翻译中…', 'ja-JP', '⏳');
          const dataUrl = reader.result;
          const r = await callImage(dataUrl);
          const tl = r.target_language === 'ja' ? 'ja-JP' : 'zh-CN';
          setSourceDisplay(r.cleaned_source || r.ocr_text || '识别完成', '📸');
          setTarget(r.translation || '', tl, '✅');
        } catch (err) {
          setTarget('❌ ' + err.message, 'ja-JP', '⚠️');
        } finally {
          imageInput.value = '';
        }
      };
      reader.readAsDataURL(file);
    });

    // ---------- 文字模式 + 防抖翻译 ----------
    textModeBtn.addEventListener('click', () => {
      setSourceInput('');
      setTarget('……', 'ja-JP', '');
      clearStatuses();
    });

    srcInput.addEventListener('input', () => {
      const text = getSourceInputValue();
      if (!text) {
        setTarget('……', 'ja-JP', '');
        if (translateDebounceTimer) clearTimeout(translateDebounceTimer);
        return;
      }
      setTarget('⏳ 翻译中…', 'ja-JP', '⏳');

      if (translateDebounceTimer) clearTimeout(translateDebounceTimer);
      translateDebounceTimer = setTimeout(async () => {
        try {
          abortPreviousRequest();
          const translated = await callTranslate(text);
          const tl = translated.target_language === 'ja' ? 'ja-JP' : 'zh-CN';
          setTarget(translated.translation || '', tl, '✨');
        } catch (err) {
          setTarget('❌ ' + err.message, 'ja-JP', '⚠️');
        }
      }, 600);
    });

    // 清空
    clearTopBtn.addEventListener('click', () => {
      if (isRecording) stopRecordingAndCleanup();
      abortPreviousRequest();
      setSourceDisplay('✨ 已清空', '');
      setTarget('……', 'ja-JP', '');
      srcInput.value = '';
      clearStatuses();
    });

    // 朗读
    speakBtn.addEventListener('click', () => {
      const text = dstText.textContent.trim();
      if (!text || text === '……' || text.startsWith('❌')) return;
      if (!('speechSynthesis' in window)) {
        alert('浏览器不支持朗读');
        return;
      }
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lastTargetLang || 'ja-JP';
      speechSynthesis.speak(u);
    });

    // 字体缩放
    fontMinusBtn.addEventListener('click', () => adjustFontScale(-0.1));
    fontPlusBtn.addEventListener('click', () => adjustFontScale(0.1));

    // 设置面板
    settingsBtn.addEventListener('click', () => sheet.classList.add('show'));
    closeBtn.addEventListener('click', () => sheet.classList.remove('show'));
    saveBtn.addEventListener('click', () => {
      saveSettings();
      sheet.classList.remove('show');
      setStatus(dstStatus, '⚙️ 已保存', false);
      setTimeout(() => setStatus(dstStatus, ''), 1500);
    });

    // 点击外部关闭 (简单处理)
    sheet.addEventListener('click', (e) => {
      if (e.target === sheet) sheet.classList.remove('show');
    });

    // 清理: 页面卸载时释放资源
    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      if (recordingTimeout) clearTimeout(recordingTimeout);
    });

    // 启动
    initSettings();
    setSourceDisplay('✨ 轻触「语音」或「拍照」');
    setTarget('……');
  })();
</script>
</body>
</html>
